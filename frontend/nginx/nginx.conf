server {
    listen 80;
    server_name bsw.iitd.ac.in;

    # Standard Redirect HTTP -> HTTPS
    return 301 https://bsw.iitd.ac.in$request_uri;
}

server {
    listen 443 ssl;
    server_name bsw.iitd.ac.in;

    # SSL Certificates
    # IMPORTANT: If you have official IITD certs for this domain, replace the files in ./certs
    ssl_certificate     /etc/ssl/certs/server.crt;
    ssl_certificate_key /etc/ssl/certs/server.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    # 1. Serve React App
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 2. Serve Question Papers
    location /files/ {
        alias /app/public/;
        autoindex off;
        add_header Cache-Control "public, max-age=86400";
    }

    # 3. Proxy API
    location /api/ {
        proxy_pass http://backend:3000/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}